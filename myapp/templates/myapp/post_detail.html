{% extends "myapp/base.html" %}

{%block content%}
{% if post %}
<div>
    <div class="card-nav">
        <a href="{%url 'home_view'%}">
            <button class="button"><i class="bi bi-arrow-left"></i>Back</button>
        </a>
        <h5>{{post.title}}</h5>
    </div>
<p>{{post.pub_date}}</p>
<p>{{post.author}}</p>
<p class="card-text">{{post.content}}</p>
<button>Edit</button>
<button>Delete</button>
</div>
{% endif%}
{% endblock %}
